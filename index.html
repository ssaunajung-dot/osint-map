<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 13. AM 7:00:40</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.2232, 43.6793], {
      radius: 6,
      fillColor: '#3498db',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 이라크</b><br>' +
      '<small>Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '브리핑 대상 국가(전반 상황 보고)<br>' +
      '<span style="color:#3498db">● LOW</span> | political'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 바그다드</b><br>' +
      '<small>Baghdad</small><br>' +
      '<hr style="margin:4px 0">' +
      '바그다드 공항 미 외교지원센터 드론 접근 시도 저지<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33, 41.5], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 서부 이라크</b><br>' +
      '<small>Western Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '미 KC-135 공중급유기 서부 이라크 작전 중 손실 및 수색·구조 진행<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.2625, 44.2346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 바그다드 국제공항</b><br>' +
      '<small>Baghdad International Airport</small><br>' +
      '<hr style="margin:4px 0">' +
      '공항 내 외교지원센터 주변 드론 접근 격추<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | infrastructure'
    );

    L.circleMarker([33.2625, 44.2346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 외교지원센터</b><br>' +
      '<small>Diplomatic Support Center</small><br>' +
      '<hr style="margin:4px 0">' +
      '바그다드 국제공항 내 미 대사관 연계 시설 표적 드론 접근 시도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | political'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 에르빌</b><br>' +
      '<small>Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      '에르빌 인근 드론 공격으로 프랑스 장교 사망 및 병력 부상 보고<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 프랑스군-페쉬메르가 공동기지</b><br>' +
      '<small>French–Peshmerga Joint Base (near Erbil)</small><br>' +
      '<hr style="margin:4px 0">' +
      '에르빌 인근 공동기지 피격 정황(드론 공격) 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([35.4681, 44.3922], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 키르쿠크</b><br>' +
      '<small>Kirkuk</small><br>' +
      '<hr style="margin:4px 0">' +
      'PMF(하샤드) 제40여단 시설 공습 주장 확산<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([35.4681, 44.3922], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 하샤드 제40여단 시설</b><br>' +
      '<small>PMF 40th Brigade Facility (Kirkuk)</small><br>' +
      '<hr style="margin:4px 0">' +
      '키르쿠크 내 하샤드 제40여단 시설 공습 주장<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([32.5598, 41.9196], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 안바르</b><br>' +
      '<small>Al Anbar Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '안바르 내 민병대 거점 공습 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([34.5338, 43.4837], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 살라흐앗딘</b><br>' +
      '<small>Saladin Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '살라흐앗딘 내 민병대 거점 공습 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([30.5085, 47.7804], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 바스라</b><br>' +
      '<small>Basra</small><br>' +
      '<hr style="margin:4px 0">' +
      '바스라 마즈눈 유전 레이더 드론 표적 보도<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([30.25, 47.2], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 마즈눈 유전</b><br>' +
      '<small>Majnoon Oil Field</small><br>' +
      '<hr style="margin:4px 0">' +
      '마즈눈 유전 레이더가 드론 2대로 표적화됐다는 보도(피해 제한적)<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
