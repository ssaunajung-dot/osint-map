<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 13. AM 11:00:26</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.2232, 43.6793], {
      radius: 6,
      fillColor: '#3498db',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏥 이라크</b><br>' +
      '<small>Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '전국적 기상 예보 및 브리핑 범위 언급<br>' +
      '<span style="color:#3498db">● LOW</span> | humanitarian'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 바그다드</b><br>' +
      '<small>Baghdad</small><br>' +
      '<hr style="margin:4px 0">' +
      '바그다드 상공 적성 전투기 비행 주장 확산 및 브리핑 기준 시각 표기<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([33, 41], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 이라크 서부</b><br>' +
      '<small>Western Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '서부 이라크에서 발생한 KC-135 사고 관련 '공격 아님' 공식화<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 에르빌</b><br>' +
      '<small>Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      '에르빌 내 페쉬메르가-프랑스 합동기지 공격으로 프랑스 군인 사망 확인<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 쿠르드자치정부(KRG) 지역</b><br>' +
      '<small>Kurdistan Regional Government area</small><br>' +
      '<hr style="margin:4px 0">' +
      '에르빌 소재 합동기지 공격 관련 KRG 지역 언급<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | political'
    );

    L.circleMarker([30.5085, 47.7804], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 바스라</b><br>' +
      '<small>Basra</small><br>' +
      '<hr style="margin:4px 0">' +
      '바스라 주 사파완 국경시장 인근 상업지 대형 화재 진화<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | infrastructure'
    );

    L.circleMarker([30.5085, 47.7804], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 바스라 주</b><br>' +
      '<small>Basra Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '사파완 국경통과지점 관련 바스라 주 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | infrastructure'
    );

    L.circleMarker([30.1549, 47.7249], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 사파완</b><br>' +
      '<small>Safwan</small><br>' +
      '<hr style="margin:4px 0">' +
      '사파완 국경 관문 인근 상업지 화재 진화<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | infrastructure'
    );

    L.circleMarker([30.145, 47.72], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 사파완 국경 관문</b><br>' +
      '<small>Safwan Border Crossing</small><br>' +
      '<hr style="margin:4px 0">' +
      '사파완 국경 관문 인근 상업지 화재 진화<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | infrastructure'
    );

    L.circleMarker([33.2232, 43.6793], {
      radius: 6,
      fillColor: '#3498db',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏥 이라크 전역</b><br>' +
      '<small>Nationwide Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '뇌우성 강우 및 기온 하강 예보<br>' +
      '<span style="color:#3498db">● LOW</span> | humanitarian'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
