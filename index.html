<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 17. PM 7:01:00</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.2232, 43.6793], {
      radius: 6,
      fillColor: '#3498db',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 이라크</b><br>' +
      '<small>Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      'OSINT 브리핑 대상 국가/경유지로 언급<br>' +
      '<span style="color:#3498db">● LOW</span> | political'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 바그다드</b><br>' +
      '<small>Baghdad</small><br>' +
      '<hr style="margin:4px 0">' +
      '브리핑 기준지 및 내각 발표/이란과 협의/환율 동향 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([26.5667, 56.25], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 호르무즈 해협</b><br>' +
      '<small>Strait of Hormuz</small><br>' +
      '<hr style="margin:4px 0">' +
      '유조선 통과·호송 및 선별 통과 협상/통과 허용 협의 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([36.3456, 43.1575], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 모술</b><br>' +
      '<small>Mosul</small><br>' +
      '<hr style="margin:4px 0">' +
      '모술 남부 인근 마을에서 드론 추락(폭발 없음) 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.3456, 43.1575], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 니네와 주</b><br>' +
      '<small>Nineveh Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '니네와 주 모술 남부에서 드론 추락 사건 언급<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.3456, 43.1575], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 니스프 텔</b><br>' +
      '<small>Nisf Tel</small><br>' +
      '<hr style="margin:4px 0">' +
      '모술 남부 ‘니스프 텔’ 마을에서 무인기 추락(폭발/인명피해 없음) 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([48.8566, 2.3522], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 파리</b><br>' +
      '<small>Paris</small><br>' +
      '<hr style="margin:4px 0">' +
      '프랑스의 ‘호르무즈 개방 작전 불참’ 재확인 발언 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([33.4206, 43.2956], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 안바르 주</b><br>' +
      '<small>Al Anbar Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '안바르 주 알타르타르 지역 하쉬드 알아샤이리 거점 공습 및 지휘관 부상 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.4206, 43.2956], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 라마디</b><br>' +
      '<small>Ramadi</small><br>' +
      '<hr style="margin:4px 0">' +
      '라마디 인근 알타르타르 지역 거점 공습 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.6, 43.7], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 알타르타르</b><br>' +
      '<small>Lake Tharthar</small><br>' +
      '<hr style="margin:4px 0">' +
      '알타르타르 지역 하쉬드 알아샤이리 거점 공습 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 알나바이</b><br>' +
      '<small>Al Nabai</small><br>' +
      '<hr style="margin:4px 0">' +
      '바그다드 권역 ‘알나바이’ PMF 시설 피격(직전 주기 언급)<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.8547, 35.8623], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏥 레바논</b><br>' +
      '<small>Lebanon</small><br>' +
      '<hr style="margin:4px 0">' +
      '레바논 전선 격화 연동으로 교민/체류자 대피 조치 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | humanitarian'
    );

    L.circleMarker([33.8938, 35.5018], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏥 베이루트</b><br>' +
      '<small>Beirut</small><br>' +
      '<hr style="margin:4px 0">' +
      '베이루트 체류 이라크인 1차 대피 개시 보도<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | humanitarian'
    );

    L.circleMarker([31.9539, 35.9106], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏥 암만</b><br>' +
      '<small>Amman</small><br>' +
      '<hr style="margin:4px 0">' +
      '베이루트-암만-이라크 경유 대피 동선 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | humanitarian'
    );

    L.circleMarker([35.6892, 51.389], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 테헤란</b><br>' +
      '<small>Tehran</small><br>' +
      '<hr style="margin:4px 0">' +
      '석유장관이 ‘이란과 직접 협의’(바그다드-테헤란)로 호르무즈 통과 논의 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 에르빌</b><br>' +
      '<small>Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      '달러 환율이 바그다드·에르빌 장 마감 기준 상승 보도<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
