<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 10. AM 8:09:10</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([36.34, 43.12], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 니네베</b><br>' +
      '<small>Nineveh</small><br>' +
      '<hr style="margin:4px 0">' +
      'دف اللواء 30 في الحشد الشعبي بنينوى](https://shafaq.com/ar/%D8%A3%D9%85%DB%80%D9<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.19, 44.01], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 아르빌</b><br>' +
      '<small>Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      '**[إسقاط ثلاث طائرات مسيرة في أربيل (쿠르드 테러 대응)](https://shafaq.com/ar/%D9%83%D9<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([35.47, 44.39], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 키르쿠크</b><br>' +
      '<small>Kirkuk</small><br>' +
      '<hr style="margin:4px 0">' +
      '*[Five PMF fighters killed in Kirkuk](https://www.iraqinews.com/iraq/five-pmf-fi<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
