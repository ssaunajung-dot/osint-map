<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 16. AM 7:00:33</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.2232, 43.6793], {
      radius: 6,
      fillColor: '#3498db',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 이라크</b><br>' +
      '<small>Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '이라크 OSINT 브리핑 지역 범위<br>' +
      '<span style="color:#3498db">● LOW</span> | political'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 바그다드</b><br>' +
      '<small>Baghdad</small><br>' +
      '<hr style="margin:4px 0">' +
      '브리핑 기준 시각 표기 및 국회 원유수출 논의<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([33.2625, 44.2346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 바그다드 국제공항</b><br>' +
      '<small>Baghdad International Airport</small><br>' +
      '<hr style="margin:4px 0">' +
      '국제공항 주변 로켓 4발 재피격<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 카르흐</b><br>' +
      '<small>Karkh</small><br>' +
      '<hr style="margin:4px 0">' +
      '카르흐 교도소 인근에 로켓 낙하 정황<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([35.5613, 45.4309], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 술라이마니야</b><br>' +
      '<small>Sulaymaniyah</small><br>' +
      '<hr style="margin:4px 0">' +
      '술라이마니야 내 쿠르드계 거점 표적 드론 공격<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([35.5613, 45.4309], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 자르코웨즈</b><br>' +
      '<small>Zarkowez</small><br>' +
      '<hr style="margin:4px 0">' +
      '자르코웨즈 지역 경계초소 주변 드론 4대 낙하<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([35.5613, 45.4309], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 술라이마니야주</b><br>' +
      '<small>Sulaymaniyah Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '술라이마니야주 내 드론 공격 보고<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([32.4682, 44.5502], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 바빌</b><br>' +
      '<small>Babil</small><br>' +
      '<hr style="margin:4px 0">' +
      '바빌 지역 공습 보도 후 당국이 피격 없음으로 번복<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([32.4682, 44.5502], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 바빌주</b><br>' +
      '<small>Babil Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '바빌주 북부 공습 주장 번복 관련<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([32.19, 44.11], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 자르프 알나스르</b><br>' +
      '<small>Jurf al-Nasr</small><br>' +
      '<hr style="margin:4px 0">' +
      '자르프 알나스르 공습 보도 후 당국이 부인<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([32.19, 44.11], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 자르프 알사크르</b><br>' +
      '<small>Jurf al-Sakhar</small><br>' +
      '<hr style="margin:4px 0">' +
      '자르프 알사크르(동일 지역) 공습 주장 혼선<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([39.0665, 35.2433], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 터키</b><br>' +
      '<small>Turkey</small><br>' +
      '<hr style="margin:4px 0">' +
      '터키(제이한) 향 원유수출 논의<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([37.025, 35.8179], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 제이한</b><br>' +
      '<small>Ceyhan</small><br>' +
      '<hr style="margin:4px 0">' +
      '제이한 향 원유수출/협상 논의<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 에르빌</b><br>' +
      '<small>Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      '에르빌의 제이한 수출 조건화 논란<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([36.6333, 42.8333], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 모술댐</b><br>' +
      '<small>Mosul Dam</small><br>' +
      '<hr style="margin:4px 0">' +
      '모술댐 내 외국군 주둔설을 정부가 부인<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([36.34, 43.13], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 니나와주</b><br>' +
      '<small>Nineveh Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '니나와주 모술댐 관련 주둔설 부인<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
