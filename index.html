<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 12. PM 3:16:10</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.2232, 43.6793], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8

      '<b>🏛️ 이라크</b><br>' +

    }).addTo(map).bindPopup(

    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +

        '⚔️ Military | 🏛️ Political<br>' +

</body>
</html>
