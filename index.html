<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 12. PM 2:04:12</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 바그다드</b><br>' +
      '<small>Baghdad</small><br>' +
      '<hr style="margin:4px 0">' +
      '이라크 정계 동향(말리키 조건부 사퇴론·아사이브의 수다니 연임 압박) 및 브리핑 기준 시각 표기<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([33.2232, 43.6793], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 이라크</b><br>' +
      '<small>Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '브리핑 대상 국가 및 유전 항만 운영 중단/상선 피격 등 국가 차원 동향<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([32.4682, 44.5502], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 바빌주</b><br>' +
      '<small>Babil Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '바빌 북부 PMF(카타이브 헤즈볼라) 거점 공습 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 쿠르드 지역</b><br>' +
      '<small>Kurdistan Region</small><br>' +
      '<hr style="margin:4px 0">' +
      '쿠르드 지역 내 드론 요격 발생(아르빌·술라이마니야)<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ KRI</b><br>' +
      '<small>Kurdistan Region of Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      'KRI 내 방공 경계 강화 가능성 언급(드론 요격 관련)<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 아르빌</b><br>' +
      '<small>Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      '드론 2대 요격/격추 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([35.5613, 45.4346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 술라이마니야</b><br>' +
      '<small>Sulaymaniyah</small><br>' +
      '<hr style="margin:4px 0">' +
      '드론 1대 격추 보도(시내 메르크반 지역)<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([35.5613, 45.4346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 메르크반</b><br>' +
      '<small>Mirkaban</small><br>' +
      '<hr style="margin:4px 0">' +
      '술라이마니야 시내 메르크반 지역에서 드론 1대 격추 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([30.5085, 47.7804], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 이라크 남부</b><br>' +
      '<small>Southern Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '이라크 남부 유전 항만(석유항) 운영 전면 중단 보도<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([26.937, 52.164], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 페르시아만</b><br>' +
      '<small>Persian Gulf</small><br>' +
      '<hr style="margin:4px 0">' +
      '이라크 유전 항만(석유항) 중단 및 북부 걸프 상선 피격 경보 관련 해역 언급<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | infrastructure'
    );

    L.circleMarker([29.5, 48.5], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 북부 걸프 해역</b><br>' +
      '<small>Northern Persian Gulf</small><br>' +
      '<hr style="margin:4px 0">' +
      'UKMTO 북부 걸프 상선 피격(ATTACK) 경보<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | infrastructure'
    );

    L.circleMarker([26.937, 52.164], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 걸프 해역</b><br>' +
      '<small>Gulf waters</small><br>' +
      '<hr style="margin:4px 0">' +
      '이란 의회 의장 발언으로 걸프 해역 위협/긴장 고조 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([32.4279, 53.688], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 이란</b><br>' +
      '<small>Iran</small><br>' +
      '<hr style="margin:4px 0">' +
      '이란 의회 의장 발언(걸프 위협·자제 종료) 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([35.6892, 51.389], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 테헤란</b><br>' +
      '<small>Tehran</small><br>' +
      '<hr style="margin:4px 0">' +
      '이란 의회 의장 발언 출처 도시로 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([30.5852, 36.2384], {
      radius: 6,
      fillColor: '#3498db',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 요르단</b><br>' +
      '<small>Jordan</small><br>' +
      '<hr style="margin:4px 0">' +
      '요르단 수출 1위 목적지로 이라크 부상(교역 동향)<br>' +
      '<span style="color:#3498db">● LOW</span> | economic'
    );

    L.circleMarker([31.9539, 35.9106], {
      radius: 6,
      fillColor: '#3498db',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 암만</b><br>' +
      '<small>Amman</small><br>' +
      '<hr style="margin:4px 0">' +
      '요르단-이라크 교역 동향 관련 언급(바그다드/암만)<br>' +
      '<span style="color:#3498db">● LOW</span> | economic'
    );

    L.circleMarker([32, 44], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 이라크 중부</b><br>' +
      '<small>Central Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '공습 범위가 이라크 중부(바빌)로 확장 정황 언급<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
