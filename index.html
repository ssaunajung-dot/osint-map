<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 14. PM 7:00:41</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.2232, 43.6793], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 이라크</b><br>' +
      '<small>Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '이라크 전역 OSINT 브리핑 및 정세 동향(드론 사건·여행경보·가스공급·의회 논의)<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 바그다드</b><br>' +
      '<small>Baghdad</small><br>' +
      '<hr style="margin:4px 0">' +
      '드론 피격 사건 연쇄 및 전력부(이란 가스 공급)·의회(안보협정 폐기)·터키 대사관 경보 관련 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([34.5333, 43.7833], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 살라흐알딘주 동부</b><br>' +
      '<small>Eastern Salah ad Din Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      'PMF(하쉬드) 본부/거점 드론 공격 보고<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([34.5333, 43.7833], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 살라흐알딘주</b><br>' +
      '<small>Salah ad Din Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '동부 지역 PMF 시설 드론 공격 관련 지역으로 언급<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 에르빌</b><br>' +
      '<small>Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      'UAE 총영사관 드론 피격(경비 부상·건물 피해) 및 경계선언 확대<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | political'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 쿠르드자치지역</b><br>' +
      '<small>Kurdistan Region</small><br>' +
      '<hr style="margin:4px 0">' +
      '에르빌 소재 UAE 총영사관 피격 관련 관할 지역으로 언급<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | political'
    );

    L.circleMarker([35.0519, 44.4087], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 키르쿠크주 라샤드</b><br>' +
      '<small>Rashad, Kirkuk Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '이라크군 관할 구역 내 미상 드론 추락 보고<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([35.4667, 44.4], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 키르쿠크주</b><br>' +
      '<small>Kirkuk Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '라샤드 지역 미상 드론 추락 사건 발생 지역으로 언급<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([32.4279, 53.688], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 이란</b><br>' +
      '<small>Iran</small><br>' +
      '<hr style="margin:4px 0">' +
      '이란 가스의 대(對)이라크 공급량 증가(6→18백만㎥)<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([38.9072, -77.0369], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 미국</b><br>' +
      '<small>United States</small><br>' +
      '<hr style="margin:4px 0">' +
      '이라크-미국 안보협정 폐기 서명 주장 및 미군 철수 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([34.8021, 38.9968], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 시리아</b><br>' +
      '<small>Syria</small><br>' +
      '<hr style="margin:4px 0">' +
      '미군 철수 후 시리아군이 기지에 진입했다는 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.507, 40.747], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 하사카주</b><br>' +
      '<small>Al-Hasakah Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '루마일란/하라브 알지르 기지에 시리아군 진입 보도 지역<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([37.057, 41.226], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 루마일란</b><br>' +
      '<small>Rmelan</small><br>' +
      '<hr style="margin:4px 0">' +
      '미군 철수 후 루마일란 일대 기지로 시리아군·내무치안부대 진입 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([37.057, 41.226], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 하라브 알지르 기지</b><br>' +
      '<small>Harab al-Jir Base</small><br>' +
      '<hr style="margin:4px 0">' +
      '루마일란 인근 하라브 알지르 기지에 시리아군 진입 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([39.9334, 32.8597], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 터키</b><br>' +
      '<small>Turkey</small><br>' +
      '<hr style="margin:4px 0">' +
      '터키 대사관이 자국민에 이라크 여행 자제 경보 발령<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
