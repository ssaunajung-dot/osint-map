<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 14. PM 10:00:28</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.2232, 43.6793], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 이라크</b><br>' +
      '<small>Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '‘이슬라믹 레지스턴스(이라크)’가 이라크 전역·역내에서 작전 다수 주장<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 바그다드</b><br>' +
      '<small>Baghdad</small><br>' +
      '<hr style="margin:4px 0">' +
      '브리핑 기준 시각/장소 표기 및 공항 축 드론 위협 반복 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([33.2628, 44.2346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 바그다드 국제공항</b><br>' +
      '<small>Baghdad International Airport</small><br>' +
      '<hr style="margin:4px 0">' +
      '국제공항 인근 ‘빅토리아(구 빅토리) 지원기지’ 접근 드론 격추<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.2628, 44.2346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 빅토리아 지원기지</b><br>' +
      '<small>Victoria Base (formerly Victory Base)</small><br>' +
      '<hr style="margin:4px 0">' +
      '지원기지 표적 드론이 목표 도달 전 격추(2번째 처리로 보고)<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.2628, 44.2346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 라드와니야</b><br>' +
      '<small>Radwaniyah</small><br>' +
      '<hr style="margin:4px 0">' +
      '바그다드 국제공항 인근 라드와니야 접근로에서 드론 위협 언급<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 에르빌</b><br>' +
      '<small>Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      '‘라나즈’ 정유시설 드론 피격 후 가동 중단 및 미 대사관의 에르빌 영사관 접근 자제 촉구<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | infrastructure'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 쿠르드자치정부</b><br>' +
      '<small>Kurdistan Regional Government (KRG)</small><br>' +
      '<hr style="margin:4px 0">' +
      '쿠르드자치정부 관할 에르빌 내 정유시설 피격으로 에너지 인프라 리스크 부각<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | infrastructure'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 라나즈 정유시설</b><br>' +
      '<small>Ranaz Refinery</small><br>' +
      '<hr style="margin:4px 0">' +
      '드론 공격으로 화재 발생, 이후 가동 중단 확인<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | infrastructure'
    );

    L.circleMarker([34.5333, 43.7833], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 살라흐앗딘주</b><br>' +
      '<small>Saladin Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '살라흐앗딘 동부 일대 PMF 4개 거점 동시 드론 피격 보고<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 그린존</b><br>' +
      '<small>Green Zone (Baghdad)</small><br>' +
      '<hr style="margin:4px 0">' +
      '미국 대사관이 바그다드 그린존 및 에르빌 영사관 접근 자제 촉구<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 에르빌 영사관</b><br>' +
      '<small>U.S. Consulate General Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      '미국 대사관 경고에서 에르빌 영사관 접근 자제 대상에 포함<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
