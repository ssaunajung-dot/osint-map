<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 15. PM 7:00:27</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.2232, 43.6793], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 이라크</b><br>' +
      '<small>Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '브리핑 지역(이라크 OSINT) 및 서부 이라크 KC-135 항공사고 언급<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 바그다드</b><br>' +
      '<small>Baghdad</small><br>' +
      '<hr style="margin:4px 0">' +
      '브리핑 기준 위치 및 총리의 PMF·보안군 시설 공격 거부 발언, 환율 동향 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([29.3117, 47.4818], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 쿠웨이트</b><br>' +
      '<small>Kuwait</small><br>' +
      '<hr style="margin:4px 0">' +
      '쿠웨이트 국제공항 레이더가 드론 공격으로 손상(국방부 발표)<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | infrastructure'
    );

    L.circleMarker([29.3759, 47.9774], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 쿠웨이트시티</b><br>' +
      '<small>Kuwait City</small><br>' +
      '<hr style="margin:4px 0">' +
      '쿠웨이트 국제공항 인근(쿠웨이트시티)에서 드론 공격으로 레이더 손상 보고<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | infrastructure'
    );

    L.circleMarker([29.2266, 47.9689], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 쿠웨이트 국제공항</b><br>' +
      '<small>Kuwait International Airport</small><br>' +
      '<hr style="margin:4px 0">' +
      '드론 3대 공격으로 공항 레이더 손상<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | infrastructure'
    );

    L.circleMarker([25, 51], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 걸프권</b><br>' +
      '<small>Persian Gulf region (Gulf states)</small><br>' +
      '<hr style="margin:4px 0">' +
      '걸프권 공항·항만 방공 강화 가능성 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | infrastructure'
    );

    L.circleMarker([33, 41], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 서부 이라크</b><br>' +
      '<small>Western Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '미 KC-135 공중급유기 항공사고(정확 지점 미공개)로 사망자 발생<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([32.5, 41.9], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 안바르 주</b><br>' +
      '<small>Al Anbar Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      '폭풍으로 송전 전주 다수 전도 및 전력망 피해 보고<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | infrastructure'
    );

    L.circleMarker([33.3491, 43.785], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 팔루자</b><br>' +
      '<small>Fallujah</small><br>' +
      '<hr style="margin:4px 0">' +
      '강풍으로 송전 전주 붕괴 등 전력 인프라 피해 보고<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | infrastructure'
    );

    L.circleMarker([34.1412, 42.3781], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 하디타</b><br>' +
      '<small>Haditha</small><br>' +
      '<hr style="margin:4px 0">' +
      '강풍으로 전력 인프라 물리 피해 보고<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | infrastructure'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 아르빌</b><br>' +
      '<small>Erbil</small><br>' +
      '<hr style="margin:4px 0">' +
      '아르빌 시장에서 달러 환율 상승 재확인<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([36.2376, 43.9632], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 에르빌 공항</b><br>' +
      '<small>Erbil International Airport</small><br>' +
      '<hr style="margin:4px 0">' +
      '감시 키워드로 '에르빌 공항/미군 기지' 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | military'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 카파흐</b><br>' +
      '<small>Karrada (Kaffa/Kapah as referenced)</small><br>' +
      '<hr style="margin:4px 0">' +
      '바그다드 내 시장(카파흐)에서 달러 환율 상승 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 하리티야</b><br>' +
      '<small>Harithiya</small><br>' +
      '<hr style="margin:4px 0">' +
      '바그다드 내 시장(하리티야)에서 달러 환율 상승 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
