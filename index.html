<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iraq OSINT Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body { margin: 0; font-family: 'Segoe UI', sans-serif; }
    #header {
      background: #1a1a2e;
      color: white;
      padding: 12px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #header h1 { margin: 0; font-size: 18px; }
    #header .time { font-size: 13px; color: #aaa; }
    #map { height: calc(100vh - 50px); }
    .legend {
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 2;
    }
    .legend i {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>🇮🇶 Iraq OSINT Map</h1>
    <span class="time">Last updated: 2026. 3. 15. PM 3:00:37</span>
  </div>
  <div id="map"></div>
  <script>
    var map = L.map('map').setView([33.3, 44.4], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);

    
    L.circleMarker([33.2232, 43.6793], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 이라크</b><br>' +
      '<small>Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '미국 대사관의 자국민 즉시 출국 경보 및 전반적 위협 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([33.3152, 44.3661], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>🏛️ 바그다드</b><br>' +
      '<small>Baghdad</small><br>' +
      '<hr style="margin:4px 0">' +
      '미국 대사관 관련 즉시 출국 경보 및 경계 강화 가능성 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | political'
    );

    L.circleMarker([32.4786, 44.4326], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 바빌론 주</b><br>' +
      '<small>Babil Governorate</small><br>' +
      '<hr style="margin:4px 0">' +
      'PMF 거점 폭발 및 낙하물(탄도미사일 잔해) 보도 확산<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([32.4786, 44.4326], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 힐라</b><br>' +
      '<small>Hillah</small><br>' +
      '<hr style="margin:4px 0">' +
      '도심 대형 폭발 발생 및 PMF 본부 타격 주장 확산<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([32.4786, 44.4326], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 알자자이르 지구</b><br>' +
      '<small>Al-Jazائر District (Hillah area)</small><br>' +
      '<hr style="margin:4px 0">' +
      '바빌론 주(힐라 인근) 폭발·치안 경계 강화 언급 지역<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([32.4786, 44.4326], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 알시아히</b><br>' +
      '<small>Al-Siyahi (Hillah area)</small><br>' +
      '<hr style="margin:4px 0">' +
      '탄도미사일 잔해 낙하 보도 지역<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([36.1911, 44.0092], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 쿠르드 지역</b><br>' +
      '<small>Kurdistan Region</small><br>' +
      '<hr style="margin:4px 0">' +
      '연방 석유부의 파이프라인 활용 수출 요청 거부 관련<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([39, 35], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 터키</b><br>' +
      '<small>Turkey</small><br>' +
      '<hr style="margin:4px 0">' +
      '지한 경유 북부 수출(송유관·항만) 관련 국가<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([37.0247, 35.8177], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 지한</b><br>' +
      '<small>Ceyhan</small><br>' +
      '<hr style="margin:4px 0">' +
      '쿠르드 지역-터키 지한 송유관·항만 경유 수출 대체안 거부 이슈<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([36.34, 43.13], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 이라크 북부</b><br>' +
      '<small>Northern Iraq</small><br>' +
      '<hr style="margin:4px 0">' +
      '북부 수출망(지한 경유 수출) 관련 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    L.circleMarker([33.2628, 44.2346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 바그다드 국제공항</b><br>' +
      '<small>Baghdad International Airport</small><br>' +
      '<hr style="margin:4px 0">' +
      '공항 내 기지구역이 드론 3대로 공격받았다는 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.2628, 44.2346], {
      radius: 12,
      fillColor: '#e74c3c',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>⚔️ 빅토리 베이스 컴플렉스</b><br>' +
      '<small>Victory Base Complex</small><br>' +
      '<hr style="margin:4px 0">' +
      '바그다드 국제공항 인근 기지구역 드론 공격 표적 보도<br>' +
      '<span style="color:#e74c3c">● HIGH</span> | military'
    );

    L.circleMarker([33.2232, 43.6793], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>📍 이라크 전 국경</b><br>' +
      '<small>Iraq Border (nationwide)</small><br>' +
      '<hr style="margin:4px 0">' +
      '국경출입국청의 신규 국경통로 개설 예고 및 대체 통로 준비<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | infrastructure'
    );

    L.circleMarker([26.566, 56.25], {
      radius: 9,
      fillColor: '#f39c12',
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.8
    }).addTo(map).bindPopup(
      '<b>💰 호르무즈</b><br>' +
      '<small>Strait of Hormuz</small><br>' +
      '<hr style="margin:4px 0">' +
      '호르무즈 차질 대체 목적의 북부(지한 경유) 수출 방안 언급<br>' +
      '<span style="color:#f39c12">● MEDIUM</span> | economic'
    );

    var legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      var div = L.DomUtil.create('div', 'legend');
      div.innerHTML =
        '<b>Severity</b><br>' +
        '<i style="background:#e74c3c"></i> High<br>' +
        '<i style="background:#f39c12"></i> Medium<br>' +
        '<i style="background:#3498db"></i> Low<br>' +
        '<br><b>Category</b><br>' +
        '⚔️ Military | 🏛️ Political<br>' +
        '💰 Economic | 🏥 Humanitarian<br>' +
        '🚧 Border';
      return div;
    };
    legend.addTo(map);
  </script>
</body>
</html>
